syntax = "proto3";

package manga;

option go_package = "mangahub/gen/manga";

// ===== SERVICE =====
// Định nghĩa 3 RPC method mà gRPC server sẽ expose
service MangaService {
  rpc GetManga(MangaRequest) returns (MangaResponse);
  rpc SearchManga(SearchRequest) returns (SearchResponse);
  rpc UpdateProgress(ProgressRequest) returns (ProgressResponse);
}

// ===== GET MANGA =====
message MangaRequest {
  int64 id = 1;
}

message MangaResponse {
  int64  id          = 1;
  string title       = 2;
  string cover_image = 3;
  string author      = 4;
  string description = 5;
  string genre       = 6;
  string status      = 7;
}

// ===== SEARCH MANGA =====
message SearchRequest {
  string query = 1;
}

message SearchResponse {
  repeated MangaResponse results = 1;
}

// ===== UPDATE PROGRESS =====
message ProgressRequest {
  int64  user_id         = 1;
  int64  manga_id        = 2;
  int32  current_chapter = 3;
  string status          = 4;
}

message ProgressResponse {
  bool   success = 1;
  string message = 2;
}
